version: 2.1

latest: &latest
  pattern: "^1.20.*-erlang-29.*$"

# Test across Elixir versions
tags: &tags
  [
    1.20.2-erlang-29.0.3-alpine-3.24.1,
    1.19.5-erlang-28.5.0.3-alpine-3.24.1,
    1.18.4-erlang-28.5.0.2-alpine-3.23.4,
    1.17.3-erlang-27.3.4.14-alpine-3.24.1,
    1.16.3-erlang-26.2.5.21-alpine-3.24.1,
    1.15.8-erlang-26.2.5.21-alpine-3.24.1,
    1.14.5-erlang-25.3.2.9-alpine-3.19.1,
    1.13.4-erlang-24.3.4-alpine-3.15.3,
    1.12.3-erlang-24.3.4-alpine-3.15.3,
    1.11.4-erlang-23.3.4.13-alpine-3.15.3,
  ]

# Test across Ubuntu versions
ubuntu_tags: &ubuntu_tags
  [
    1.20.2-erlang-29.0.3-ubuntu-resolute-20260707,
    1.20.2-erlang-29.0.3-ubuntu-noble-20260610,
    1.20.2-erlang-29.0.3-ubuntu-jammy-20260627,
  ]

macos_xcode_versions: &macos_xcode_versions
  [
    "26.6",
    "16.4.0"
  ]

jobs:
  check-license:
    docker:
      - image: fsfe/reuse:latest
    steps:
      - checkout
      - run: reuse lint

  build-test:
    parameters:
      tag:
        type: string
    docker:
      - image: hexpm/elixir:<< parameters.tag >>
    working_directory: ~/repo
    environment:
      LC_ALL: C.UTF-8
    steps:
      - run:
          name: Install system dependencies
          command: apk add --no-cache build-base procps
      - checkout
      - run:
          name: Install hex and rebar
          command: |
            mix local.hex --force
            mix local.rebar --force
      - restore_cache:
          keys:
            - v1-mix-cache-<< parameters.tag >>-{{ checksum "mix.lock" }}
      - run: mix deps.get
      - run: mix test --exclude cgroup || mix test --failed --exclude cgroup
      - when:
          condition:
            matches: { <<: *latest, value: << parameters.tag >> }
          steps:
            - run: mix format --check-formatted
            - run: mix deps.unlock --check-unused
            - run: mix docs
            - run: mix hex.build
            - run: mix credo -a --strict
            - run: mix dialyzer
      - save_cache:
          key: v1-mix-cache-<< parameters.tag >>-{{ checksum "mix.lock" }}
          paths:
            - _build
            - deps

  cgroup-test:
    machine:
      image: ubuntu-2404:current
    working_directory: ~/repo
    environment:
      LC_ALL: C.UTF-8
    steps:
      - checkout
      - run:
          name: Verify host is running cgroup v2
          command: |
            mount | grep -q 'cgroup2 on /sys/fs/cgroup' \
              || (echo "Host is not on cgroup v2"; exit 1)
      - run:
          name: Install Erlang and Elixir
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y erlang elixir build-essential
            mix local.hex --force
            mix local.rebar --force
      - run:
          name: Create the muontrap_test cgroup
          command: |
            sudo mkdir -p /sys/fs/cgroup/muontrap_test
            sudo chown -R "$(whoami)" /sys/fs/cgroup/muontrap_test
            echo +cpu +memory | sudo tee /sys/fs/cgroup/cgroup.subtree_control
      - run: mix deps.get
      - run: mix test --only cgroup || mix test --failed --only cgroup
      - run: MIX_ENV=test mix coveralls.circle

  ubuntu-build-test:
    parameters:
      tag:
        type: string
    docker:
      - image: hexpm/elixir:<< parameters.tag >>
    working_directory: ~/repo
    environment:
      LC_ALL: C.UTF-8
    steps:
      - run:
          name: Install system dependencies
          command: |
            apt-get update -qq
            apt-get install -y build-essential procps libsctp1 ca-certificates
      - checkout
      - run: mix local.hex --force
      - run: mix deps.get
      - run: mix test --exclude cgroup || mix test --failed --exclude cgroup

  macos-test:
    parameters:
      xcode:
        type: string
    macos:
      xcode: << parameters.xcode >>
    resource_class: macos.m1.medium.gen1
    working_directory: ~/repo
    environment:
      LC_ALL: C.UTF-8
    steps:
      - checkout
      - run:
          name: Install Elixir
          command: |
            brew install elixir
            mix local.hex --force
            mix local.rebar --force
      - run: mix deps.get
      - run: mix test --exclude cgroup || mix test --failed --exclude cgroup

workflows:
  checks:
    jobs:
      - check-license:
          filters:
            tags:
              only: /.*/
      - build-test:
          name: << matrix.tag >>
          matrix:
            parameters:
              tag: *tags
      - cgroup-test
      - ubuntu-build-test:
          name: << matrix.tag >>
          matrix:
            parameters:
              tag: *ubuntu_tags
      - macos-test:
          name: macos-xcode-<< matrix.xcode >>
          matrix:
            parameters:
              xcode: *macos_xcode_versions
